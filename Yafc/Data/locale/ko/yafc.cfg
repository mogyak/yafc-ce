; CommandLineParser.cs
missing-command-line-argument=__1__에 필요한 인수가 없습니다.
console-help-message=사용법:\nYafc\nYafc --help\nYafc <project-file>\nYafc <data-path> [--mods-path <path>] [--project-file <path>] [--net-production] [--help]\n\n설명:\n    Yafc는 인수 없이 시작할 수 있습니다. 이 경우 시작 화면을 엽니다.\n    옵션이 아닌 인수 하나만 전달하면 프로젝트 파일로 처리합니다. 이전에 열어본 적 없는\n    프로젝트라면 가장 최근에 열었던 프로젝트의 시작 설정을 사용합니다.\n\n    Factorio 데이터에서 직접 시작하려면 데이터 디렉터리를 첫 번째 인수로 전달하고,\n    그 뒤에 옵션을 하나 이상 포함해야 합니다.\n\n옵션:\n    <project-file>\n        단독 인수일 때 불러올 프로젝트 파일 경로\n\n    <data-path>\n        Factorio 데이터 디렉터리 경로\n\n    --mods-path <path>\n        모드 디렉터리 경로\n\n    --project-file <path>\n        불러오거나 새로 만들 프로젝트 파일 경로\n\n    --net-production\n        순생산 또는 순소비가 있는 레시피만 제안합니다\n\n    --help\n        이 도움말을 표시하고 종료합니다.\n\n예시:\n    1. 인수 없이 Yafc 시작:\n       $ ./Yafc\n       시작 화면을 엽니다.\n\n    2. 프로젝트 경로로 Yafc 시작:\n       $ ./Yafc path/to/my/project.yafc\n       시작 화면을 건너뛰고 프로젝트를 불러옵니다.\n\n    3. 데이터, 모드 디렉터리 및 프로젝트 파일 경로로 Yafc 시작:\n       $ ./Yafc Factorio/data --mods-path Factorio/mods --project-file my-project.yafc\n       지정한 프로젝트를 열고 지정한 경로에서 게임 데이터와 모드를 불러옵니다.\n       지정한 디렉터리가 없으면 실패합니다.
